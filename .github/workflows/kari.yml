name: Kari Rostov Scheduler

on:
  schedule:
    # Слот 12:00 МСК — старт с 12:30, каждые 15 мин до 14:30 МСК (с запасом на задержку GA)
    - cron: '30 9 * * 1-6'   # 12:30 МСК
    - cron: '45 9 * * 1-6'   # 12:45 МСК
    - cron: '0 10 * * 1-6'   # 13:00 МСК
    - cron: '15 10 * * 1-6'  # 13:15 МСК
    - cron: '30 10 * * 1-6'  # 13:30 МСК
    - cron: '45 10 * * 1-6'  # 13:45 МСК
    - cron: '0 11 * * 1-6'   # 14:00 МСК
    - cron: '30 11 * * 1-6'  # 14:30 МСК

    # Слот 15:00 МСК — старт с 15:30, каждые 15 мин до 17:30 МСК
    - cron: '30 12 * * 1-6'  # 15:30 МСК
    - cron: '45 12 * * 1-6'  # 15:45 МСК
    - cron: '0 13 * * 1-6'   # 16:00 МСК
    - cron: '15 13 * * 1-6'  # 16:15 МСК
    - cron: '30 13 * * 1-6'  # 16:30 МСК
    - cron: '45 13 * * 1-6'  # 16:45 МСК
    - cron: '0 14 * * 1-6'   # 17:00 МСК
    - cron: '30 14 * * 1-6'  # 17:30 МСК

    # Слот 18:00 МСК — старт с 18:30, каждые 15 мин до 20:30 МСК
    - cron: '30 15 * * 1-6'  # 18:30 МСК
    - cron: '45 15 * * 1-6'  # 18:45 МСК
    - cron: '0 16 * * 1-6'   # 19:00 МСК
    - cron: '15 16 * * 1-6'  # 19:15 МСК
    - cron: '30 16 * * 1-6'  # 19:30 МСК
    - cron: '45 16 * * 1-6'  # 19:45 МСК
    - cron: '0 17 * * 1-6'   # 20:00 МСК
    - cron: '30 17 * * 1-6'  # 20:30 МСК

    # Слот 22:00 МСК — старт с 22:30, каждые 15 мин до 01:30 МСК (через полночь)
    - cron: '30 19 * * 1-6'  # 22:30 МСК
    - cron: '45 19 * * 1-6'  # 22:45 МСК
    - cron: '0 20 * * 1-6'   # 23:00 МСК
    - cron: '15 20 * * 1-6'  # 23:15 МСК
    - cron: '30 20 * * 1-6'  # 23:30 МСК
    - cron: '45 20 * * 1-6'  # 23:45 МСК
    - cron: '0 21 * * 1-6'   # 00:00 МСК
    - cron: '30 21 * * 1-6'  # 00:30 МСК
    - cron: '30 22 * * 1-6'  # 01:30 МСК

  workflow_dispatch:           # ручной запуск при необходимости

concurrency:
  group: kari-report          # только один запуск одновременно
  cancel-in-progress: false   # остальные ждут очереди (не отменяются)

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set report date (MSK)
        run: |
          H=$(TZ='Europe/Moscow' date +%H)
          if [ "$H" -lt 2 ]; then
            echo "MSK_DATE=$(TZ='Europe/Moscow' date -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_ENV
          else
            echo "MSK_DATE=$(TZ='Europe/Moscow' date +%Y-%m-%d)" >> $GITHUB_ENV
          fi

      - name: Restore sent-flags cache
        uses: actions/cache@v4
        with:
          path: .sent_flags
          key: kari-sent-${{ env.MSK_DATE }}
          restore-keys: kari-sent-${{ env.MSK_DATE }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report
        run: python run_once.py
        env:
          SENT_FLAGS_DIR: .sent_flags
