name: Kari Rostov Scheduler

on:
  schedule:
    # ── Слот 12:00 МСК ──────────────────────────────────────────────────────────
    # Email от КАРИ реально приходит в ~12:41–12:50 МСК (9:41–9:50 UTC).
    # Кластер сразу после прихода + резервные через каждые 10 мин + страховка.
    - cron: '40 9 * * 1-6'   # 12:40 МСК — сразу после обычного прихода письма
    - cron: '50 9 * * 1-6'   # 12:50 МСК
    - cron: '0 10 * * 1-6'   # 13:00 МСК
    - cron: '10 10 * * 1-6'  # 13:10 МСК
    - cron: '20 10 * * 1-6'  # 13:20 МСК
    - cron: '30 10 * * 1-6'  # 13:30 МСК — страховка если письмо запоздало

    # ── Слот 15:00 МСК ──────────────────────────────────────────────────────────
    # Email реально приходит в ~15:41–15:50 МСК (12:41–12:50 UTC).
    - cron: '40 12 * * 1-6'  # 15:40 МСК
    - cron: '50 12 * * 1-6'  # 15:50 МСК
    - cron: '0 13 * * 1-6'   # 16:00 МСК
    - cron: '10 13 * * 1-6'  # 16:10 МСК
    - cron: '20 13 * * 1-6'  # 16:20 МСК
    - cron: '30 13 * * 1-6'  # 16:30 МСК — страховка

    # ── Слот 18:00 МСК ──────────────────────────────────────────────────────────
    # Email реально приходит в ~18:40 МСК (15:40 UTC). Работает хорошо.
    - cron: '30 15 * * 1-6'  # 18:30 МСК
    - cron: '40 15 * * 1-6'  # 18:40 МСК
    - cron: '50 15 * * 1-6'  # 18:50 МСК
    - cron: '0 16 * * 1-6'   # 19:00 МСК
    - cron: '20 16 * * 1-6'  # 19:20 МСК
    - cron: '40 16 * * 1-6'  # 19:40 МСК — страховка

    # ── Слот 22:00 МСК ──────────────────────────────────────────────────────────
    # Email реально приходит в ~22:51 МСК (19:51 UTC). Работает хорошо.
    - cron: '45 19 * * 1-6'  # 22:45 МСК
    - cron: '55 19 * * 1-6'  # 22:55 МСК
    - cron: '5 20 * * 1-6'   # 23:05 МСК
    - cron: '20 20 * * 1-6'  # 23:20 МСК
    - cron: '40 20 * * 1-6'  # 23:40 МСК
    - cron: '0 21 * * 1-6'   # 00:00 МСК (через полночь — слот 22:00)
    - cron: '30 21 * * 1-6'  # 00:30 МСК — страховка
    - cron: '30 22 * * 1-6'  # 01:30 МСК — финальная страховка

  workflow_dispatch:           # ручной запуск при необходимости

concurrency:
  group: kari-report          # только один запуск одновременно
  cancel-in-progress: false   # остальные ждут очереди (не отменяются)

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set report date (MSK)
        run: |
          H=$(TZ='Europe/Moscow' date +%H)
          if [ "$H" -lt 2 ]; then
            echo "MSK_DATE=$(TZ='Europe/Moscow' date -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_ENV
          else
            echo "MSK_DATE=$(TZ='Europe/Moscow' date +%Y-%m-%d)" >> $GITHUB_ENV
          fi

      - name: Restore sent-flags cache
        uses: actions/cache@v4
        with:
          path: .sent_flags
          # Уникальный ключ сохранения по run_id — гарантирует что флаги всегда пишутся.
          # restore-keys подбирает последний кэш за текущую дату.
          key: kari-sent-${{ env.MSK_DATE }}-${{ github.run_id }}
          restore-keys: kari-sent-${{ env.MSK_DATE }}-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report
        run: python run_once.py
        env:
          SENT_FLAGS_DIR: .sent_flags
